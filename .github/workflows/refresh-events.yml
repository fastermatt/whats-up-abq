name: Refresh Event & Places Data

on:
  # Daily at 4 AM Mountain Time (11:00 UTC, accounting for MDT UTC-6)
  schedule:
    - cron: '0 11 * * *'

  # Allow manual trigger from the GitHub Actions tab
  workflow_dispatch:
    inputs:
      skip_places:
        description: 'Skip Google Places refresh (faster, events only)'
        required: false
        default: 'false'
        type: boolean

jobs:
  refresh-data:
    name: Fetch fresh events & places
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          # Use a PAT so the push can trigger Netlify's deploy webhook
          token: ${{ secrets.GH_PAT }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Fetch events from all sources & Google Places
        env:
          TICKETMASTER_API_KEY:  ${{ secrets.TICKETMASTER_API_KEY }}
          EVENTBRITE_TOKEN:      ${{ secrets.EVENTBRITE_TOKEN }}
          SEATGEEK_CLIENT_ID:    ${{ secrets.SEATGEEK_CLIENT_ID }}
          BANDSINTOWN_APP_ID:    ${{ secrets.BANDSINTOWN_APP_ID }}
          MEETUP_API_KEY:        ${{ secrets.MEETUP_API_KEY }}
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
          SKIP_PLACES: ${{ github.event.inputs.skip_places || 'false' }}
        run: node scripts/fetch-data.cjs

      - name: Check for data changes
        id: diff
        run: |
          git diff --stat public/data/ public/places-data.json || true
          CHANGED=$(git diff --name-only public/data/ public/places-data.json | wc -l)
          echo "changed=$CHANGED" >> "$GITHUB_OUTPUT"

      - name: Commit & push updated data
        if: steps.diff.outputs.changed != '0'
        run: |
          git config user.name  "ABQ Unplugged Bot"
          git config user.email "bot@abq-unplugged.app"
          git add public/data/ticketmaster-events.json \
                  public/data/eventbrite-events.json \
                  public/data/seatgeek-events.json \
                  public/data/bandsintown-events.json \
                  public/data/meetup-events.json \
                  public/data/google-places.json \
                  public/places-data.json
          COUNT=$(node -e "
            const files = [
              './public/data/ticketmaster-events.json',
              './public/data/eventbrite-events.json',
              './public/data/seatgeek-events.json',
              './public/data/bandsintown-events.json',
              './public/data/meetup-events.json',
            ];
            try {
              const total = files.reduce((s,f) => {
                try { return s + (require(f).length||0); } catch { return s; }
              }, 0);
              console.log(total);
            } catch { console.log('?'); }
          ")
          DATE=$(date -u '+%Y-%m-%d %H:%M UTC')
          git commit -m "data: refresh events & places — ${COUNT} events as of ${DATE}"
          git push

      - name: No changes detected
        if: steps.diff.outputs.changed == '0'
        run: echo "Data is already up to date — no commit needed."

      - name: Summary
        if: always()
        run: |
          echo "### Data Refresh Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          cnt() { node -e "try{console.log(require('$1').length)}catch{console.log(0)}"; }
          TM=$(cnt ./public/data/ticketmaster-events.json)
          EB=$(cnt ./public/data/eventbrite-events.json)
          SG=$(cnt ./public/data/seatgeek-events.json)
          BIT=$(cnt ./public/data/bandsintown-events.json)
          MU=$(cnt ./public/data/meetup-events.json)
          PL=$(cnt ./public/places-data.json)
          TOTAL=$((TM + EB + SG + BIT + MU))
          echo "| Source | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Ticketmaster | $TM |" >> $GITHUB_STEP_SUMMARY
          echo "| Eventbrite   | $EB |" >> $GITHUB_STEP_SUMMARY
          echo "| SeatGeek     | $SG |" >> $GITHUB_STEP_SUMMARY
          echo "| Bandsintown  | $BIT |" >> $GITHUB_STEP_SUMMARY
          echo "| Meetup       | $MU |" >> $GITHUB_STEP_SUMMARY
          echo "| **Total events** | **$TOTAL** |" >> $GITHUB_STEP_SUMMARY
          echo "| Places       | $PL |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Run at: $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
