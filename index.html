<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- ─── Viewport: viewport-fit=cover for iOS Dynamic Island / notch (Apple HIG) ─── -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no"
    />

    <!-- ─── iOS PWA: Add to Home Screen support ─── -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <!-- black-translucent: status bar overlays our content so we can extend behind it with safe-area-inset-top -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ABQ Unplugged" />

    <!-- ─── Android / Chrome PWA ─── -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="ABQ Unplugged" />

    <!-- ─── Theme colour: matches app background / header (Liquid Glass era) ─── -->
    <meta name="theme-color" content="#f5f7f5" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1a1a1a" media="(prefers-color-scheme: dark)" />

    <!-- ─── Description / social ─── -->
    <meta
      name="description"
      content="Explore events, places &amp; culture in Albuquerque. Check in, earn levels, and discover ABQ like never before."
    />

    <!-- ─── Favicon ─── -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />

    <!-- ─── Apple touch icons (iOS HIG: 180×180 for iPhone, 167×167 for iPad) ─── -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon-180.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="/apple-touch-icon-167.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/apple-touch-icon-152.png" />

    <!-- ─── PWA Web App Manifest ─── -->
    <link rel="manifest" href="/manifest.json" />

    <!-- ─── iOS Launch / Splash screens (iPhone 14 Pro and up) ─── -->
    <!-- Primary splash: 1179×2556 @3x (iPhone 15/16 Pro) -->
    <link
      rel="apple-touch-startup-image"
      media="screen and (device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3)"
      href="/splash/splash-1179x2556.png"
    />
    <!-- iPhone 14/15 -->
    <link
      rel="apple-touch-startup-image"
      media="screen and (device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3)"
      href="/splash/splash-1170x2532.png"
    />
    <!-- iPhone SE 3rd gen -->
    <link
      rel="apple-touch-startup-image"
      media="screen and (device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2)"
      href="/splash/splash-750x1334.png"
    />

    <title>ABQ Unplugged — Events, Places &amp; Culture in Albuquerque</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
